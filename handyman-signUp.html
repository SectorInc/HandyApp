<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <meta name="description" content="Sign up page for HandyApp — create your account to access services.">
    <link rel="stylesheet" type="text/css" href="handyapp-signUp.css">
    <title>HandyApp – Sign Up</title>
</head>
<body>
    <section class="logo">
        <img src="IMG/Logo.png" alt="HandyApp Logo" class="logoImage">
    </section>
    <header>
        <h1>Sign Up</h1>
    </header>

    <main>
        <div class="formContainment">
            <h2>Create your account</h2>
            
            <form action="handyapp.html" method="get">
                <fieldset>
                    <legend>Your Details</legend>

                    
                    <input type="text" id="fullname" name="fullname"
                           placeholder="Full name" required>

                    <input type="tel" id="phone" name="phone"
                           placeholder="Phone number" required>

                    <input type="email" id="email" name="email"
                           placeholder="Email address" required>

                    <input type="password" id="password" name="password"
                           placeholder="Create a password" required>

                    <input type="password" id="confirm_password" name="confirm_password"
                           placeholder="Confirm password" required>
                </fieldset>

                <input type="submit" value="Create Account">

                <p class="alt-signin">Or sign up with:</p>
                <div class="social-signup">
                    <a href="https://www.facebook.com/" target="_blank" rel="noopener">
                        <img src="IMG/facebook.jpg" alt="Sign up with Facebook">
                    </a>
                    
                    <a href="https://accounts.google.com/" target="_blank" rel="noopener">
                        <img src="IMG/google.jpg" alt="Sign up with Google">
                    </a>
                </div>

                <p class="login-link">Already have an account? <a href="handyapp-signIn.html">Sign In</a></p>
            </form>
        </div>
    </main>
    <footer>
            <p class="copyright">Copyright &copy; 2025 SectorNG INC</p>
         </footer>
</body>
</html>
