<!DOCTYPE html>
   <html>
    <head>
        <link rel="stylesheet" type="text/css" href="handyapp.css">
        <meta charset="utf8">
        <title> HandyApp SignIn page</title>
    </head>
    <body>
        <section class="logo">
            <img src="img/Logo.png" alt="HAndyApp Logo" class="logoImage">
        </section>
            <header>
                <h1>Sign In Page</h1>
            </header>
        <main>
            <div class="formContainer">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in</p>
                <form action="recap.html" method="post">
                        <label for="Username_or_email"></label><br>
                        <input type="text" id="Username_or_email" name="Username_or_email" placeholder="enter username or email" required>
                        <br> <br>
                        <label for="Password"></label><br>
                        <input type="password" id="Password" name="Password" placeholder="Password" required>
                        <br> <br>
                        <input type="Submit" value="Sign In">
                    <div class="Links">
                        <br><p>Forgotten Password? <a href="#">Click Here</a></p>
                        <p>Don't have an account? <a href="#">Sign Up</a> </p> 
                    </div>
                </form>
            </div>
        </main>
    </body>
   </html>
